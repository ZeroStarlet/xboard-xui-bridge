# GitHub Actions: 推送 v* 标签时自动构建多平台二进制并发布 Release。
#
# 触发方式：
#   git tag v0.2.0
#   git push origin v0.2.0
#
# 产出：
#   xboard-xui-bridge-linux-amd64.tar.gz
#   xboard-xui-bridge-linux-arm64.tar.gz
#   xboard-xui-bridge-linux-armv7.tar.gz
#   xboard-xui-bridge-darwin-amd64.tar.gz
#   xboard-xui-bridge-darwin-arm64.tar.gz
#   xboard-xui-bridge-windows-amd64.zip
#
# 设计要点：
#   1. 单 job + matrix 同时跑 6 平台；前端构建在每个 job 里独立做（go:embed
#      要求构建机里 internal/web/dist 已经填好），代价是 6×npm install——可
#      接受，因为 npm 缓存可命中且总耗时仍 < 5 min。
#   2. 版本号通过 ldflags 注入 main.version；以 git tag（含 v 前缀）为准。
#   3. 用 softprops/action-gh-release 上传到对应 Release，标签不存在则自动
#      创建；generate_release_notes 自动汇总 commits 形成 changelog。

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: linux-amd64
          - goos: linux
            goarch: arm64
            asset: linux-arm64
          - goos: linux
            goarch: arm
            goarm: '7'
            asset: linux-armv7
          - goos: darwin
            goarch: amd64
            asset: darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: darwin-arm64
          - goos: windows
            goarch: amd64
            asset: windows-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package.json'

      - name: Build frontend
        run: |
          cd web
          npm install --include=dev
          npm run build
          cd ..
          rm -rf internal/web/dist
          mkdir -p internal/web/dist
          cp -R web/dist/. internal/web/dist/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p out
          BIN=xboard-xui-bridge
          if [ "$GOOS" = "windows" ]; then BIN=xboard-xui-bridge.exe; fi
          go build -trimpath \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o out/$BIN \
            ./cmd/bridge

      - name: Package
        id: pkg
        run: |
          cd out
          ASSET="xboard-xui-bridge-${{ matrix.asset }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -j "../${ASSET}.zip" xboard-xui-bridge.exe
            echo "file=${ASSET}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "../${ASSET}.tar.gz" xboard-xui-bridge
            echo "file=${ASSET}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.file }}
          generate_release_notes: true
          fail_on_unmatched_files: true
