# xboard-xui-bridge 配置示例。
#
# 设计原则：
#   1. 任何敏感字段（token / password）建议通过部署平台的 secret 注入，
#      不要把生产配置直接提交到 git。
#   2. 任何字段缺省值都已在 internal/config/config.go: Validate 中规范化；
#      下方注释中的 "默认 X" 仅作提示，不必显式填写。
#
# 注意：YAML 解析启用了 KnownFields=true，拼写错误会让中间件启动失败。
#       例如 timeout_sec 写成 timout_sec 会被立即拒绝，不会静默回落默认值。

log:
  # debug | info | warn | error；默认 info。
  level: info
  # 日志文件路径；空字符串写到 stdout（适合 systemd / Docker 日志驱动）。
  file: ""
  # 单文件滚动阈值（MB）；0 表示不滚动。仅在 file 非空时生效。
  max_size_mb: 50
  # 保留历史日志份数；0 表示不限。
  max_backups: 5
  # 历史日志最大保留天数；0 表示不限。
  max_age_days: 7

state:
  # 本地状态 SQLite 文件路径。请放在持久卷上，避免容器临时层销毁。
  # 父目录会被自动创建（mode 0o755）。
  database: ./bridge.db

xboard:
  # Xboard 面板入口；不带尾 /，例如 https://panel.example.com。
  api_host: https://panel.example.com
  # admin_setting('server_token')：所有 V2 节点 API 鉴权使用同一 token。
  token: replace-with-your-server-token
  # 单次 HTTP 请求超时秒数；默认 15。
  timeout_sec: 15
  # 内网自签证书可设 true；公网部署严禁开启。默认 false。
  skip_tls_verify: false
  # 请求头标识；便于 Xboard 访问日志识别。默认 xboard-xui-bridge。
  user_agent: xboard-xui-bridge

xui:
  # 3x-ui 面板根 URL；不带尾 /。
  api_host: http://127.0.0.1:2053
  # 3x-ui 的 webBasePath 设置；空串等价于 /。
  base_path: ""
  # 鉴权模式：当前唯一合法取值为 token。cookie 模式因 3x-ui 现代版本对
  # 浏览器路由启用 CSRF 校验已被移除（详见 README "限制与边界"）。
  auth_mode: token
  # 3x-ui 后台生成的 48 字符 API Token。
  api_token: replace-with-your-api-token
  # 单次 HTTP 请求超时秒数；默认 15。
  timeout_sec: 15
  # 内网部署可设 true；公网部署严禁开启。默认 false。
  skip_tls_verify: false

# bridges 至少需要一项。每项把"Xboard 一个节点"绑定到"3x-ui 一个 inbound"。
# 一个中间件实例可同时承载多组 Bridge，互不干扰。
bridges:
  - name: hk-vless-01           # 必填，本配置内唯一
    xboard_node_id: 11          # Xboard 后台分配的节点数字 ID
    xboard_node_type: vless     # Xboard 节点类型；省略则与下方 protocol 一致
    xui_inbound_id: 1           # 已在 3x-ui 后台预先创建的 inbound 数字 ID
    protocol: vless             # vless / vmess / trojan / shadowsocks / hysteria / hysteria2
    flow: xtls-rprx-vision      # 仅 vless 生效；其它协议忽略
    enable: true                # false 时本 Bridge 不参与同步循环

  - name: jp-hysteria2-01
    xboard_node_id: 12
    # xboard_node_type 缺省时会按 protocol 推导：hysteria2 → hysteria（Xboard 端节点类型保持 hysteria）
    xui_inbound_id: 2
    protocol: hysteria2
    enable: true

intervals:
  # 四类同步循环的执行间隔（秒）。最低值 5；任一字段 <= 0 视为缺省 60。
  user_pull_sec: 60      # 拉 Xboard 用户清单 → diff 同步到 3x-ui
  traffic_push_sec: 60   # 拉 3x-ui 流量 → 差量推送到 Xboard
  alive_push_sec: 60     # 拉 3x-ui 在线 IP → 推送到 Xboard
  status_push_sec: 60    # 拉 3x-ui 节点状态 → 推送到 Xboard

reporting:
  # 是否启用在线 IP 上报。Xboard 设备数限制依赖此项；运营要求严控并发设备时建议 true。
  alive_enabled: true
  # 是否启用节点状态上报。关闭后 Xboard 后台节点列表将看不到 CPU / 内存数据，但不影响计费。
  status_enabled: true
  # 注意：流量倍率不在中间件配置；请在 Xboard 后台节点配置中维护 v2_server.rate，
  # Xboard 的 TrafficFetchJob 会自动按此倍率乘算上报值。中间件只上报 raw delta。
