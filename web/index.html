<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- theme-color：浏览器地址栏在移动端的着色。亮色模式用品牌绿 brand-500，
         深色模式由 prefers-color-scheme media query 切换为深背景色。
         深浅两套值需要写两条独立的 meta，浏览器会按 media match 优先级选择。 -->
    <meta name="theme-color" content="#10b981" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <title>xboard-xui-bridge</title>
  </head>
  <!-- body 不再硬编码 bg-gray-50/text-gray-900——由 src/style.css 的全局基线
       接管：body { @apply bg-background text-foreground }，深色模式下自动切换。 -->
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
